<form id="resumeForm">
    <h2>Personal Information</h2>
    <label for="name">Name:</label>
    <input type="text" id="name" placeholder="Enter your name" required />
  
    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Enter your email" required />
  
    <h2>Education</h2>
    <label for="education">Education:</label>
    <input type="text" id="education" placeholder="Your education" required />
  
    <h2>Skills</h2>
    <label for="skills">Skills:</label>
    <input type="text" id="skills" placeholder="Enter your skills (comma separated)" required />
  
    <h2>Work Experience</h2>
    <label for="experience">Work Experience:</label>
    <textarea id="experience" placeholder="Describe your work experience"></textarea>
  
    <button type="submit">Generate Resume</button>
  </form>

  
  <section id="resumeDisplay">
    <h2>Personal Information</h2>
    <p><strong>Name:</strong> <span id="displayName"></span></p>
    <p><strong>Email:</strong> <span id="displayEmail"></span></p>
  
    <h2>Education</h2>
    <p id="displayEducation"></p>
  
    <h2>Skills</h2>
    <ul id="displaySkills"></ul>
  
    <h2>Work Experience</h2>
    <p id="displayExperience"></p>
  </section>
  <script src="main.js"></script>

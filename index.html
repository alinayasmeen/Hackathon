<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Static Interactive Resume</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="resume">
      <section class="personal-info">
        <h2>Personal Information</h2>
        <p>Name: Hafiza Alina Yasmeen</p>
        <p>Email: hafizaalina123@gmail.com</p>
        <img src="/images/profile.jpg" alt="Profile Picture" />
      </section>

      <section class="education">
        <h2>Education</h2>
        <p>Intermediate with Pre Medical</p>
        <p>Khursheed College, 2023</p>
      </section>

      <section class="skills">
        <h2>Skills</h2>
        <ul id="skills-list">
          <li>Python</li>
          <li>TypeScript</li>
          <li>HTML & CSS</li>
        </ul>
        <button id="toggle-skills">Show/Hide Skills</button>
      </section>

      <section class="work-experience">
        <h2>Work Experience</h2>
        <p>Teaching</p>
        <p>Duration: 1.5 Year</p>
      </section>
    </div>
    <script src="app.js"></script>
  </body>
</html>
